<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thread Vibe</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- Navbar -->
<header class="bg-black text-white p-4 flex justify-between items-center">
  <h1 class="text-2xl font-bold">Thread Vibe</h1>
  <nav class="space-x-4">
    <a href="#" class="hover:underline">Home</a>
    <a href="#shop" class="hover:underline">Shop</a>
    <a href="#about" class="hover:underline">About</a>
    <a href="#contact" class="hover:underline">Contact</a>
    <button onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
  </nav>
</header>

<!-- Hero -->
<section class="text-center p-16 bg-gray-900 text-white">
  <h2 class="text-4xl font-bold mb-4">Wear Your Vibe</h2>
  <p class="text-lg">Premium Streetwear Collection</p>
</section>

<!-- Products -->
<section id="shop" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
  <div class="bg-white p-4 rounded-xl shadow">
    <img src="https://via.placeholder.com/300" class="rounded">
    <h3 class="text-xl font-bold">Classic Tee</h3>
    <p>PKR 1500</p>
    <button onclick="addToCart('Classic Tee',1500)" class="bg-black text-white px-4 py-2 mt-2 rounded">Add to Cart</button>
  </div>
  <div class="bg-white p-4 rounded-xl shadow">
    <img src="https://via.placeholder.com/300" class="rounded">
    <h3 class="text-xl font-bold">Hoodie</h3>
    <p>PKR 3500</p>
    <button onclick="addToCart('Hoodie',3500)" class="bg-black text-white px-4 py-2 mt-2 rounded">Add to Cart</button>
  </div>
  <div class="bg-white p-4 rounded-xl shadow">
    <img src="https://via.placeholder.com/300" class="rounded">
    <h3 class="text-xl font-bold">Denim Jacket</h3>
    <p>PKR 5000</p>
    <button onclick="addToCart('Denim Jacket',5000)" class="bg-black text-white px-4 py-2 mt-2 rounded">Add to Cart</button>
  </div>
</section>

<!-- Cart Sidebar -->
<div id="cart" class="fixed right-0 top-0 w-80 h-full bg-white shadow-lg p-4 hidden">
  <h2 class="text-xl font-bold mb-4">Your Cart</h2>
  <ul id="cart-items"></ul>
  <p class="mt-4 font-bold">Total: PKR <span id="total">0</span></p>
  <button class="bg-black text-white px-4 py-2 mt-4 w-full">Checkout</button>
</div>

<!-- About -->
<section id="about" class="p-8 text-center">
  <h2 class="text-2xl font-bold">About Thread Vibe</h2>
  <p class="mt-2">We bring premium streetwear with modern vibes.</p>
</section>

<!-- Contact -->
<section id="contact" class="p-8 text-center">
  <h2 class="text-2xl font-bold">Contact Us</h2>
  <input placeholder="Your Email" class="border p-2 m-2">
  <input placeholder="Message" class="border p-2 m-2">
  <br>
  <button class="bg-black text-white px-4 py-2 mt-2">Send</button>
</section>

<!-- Footer -->
<footer class="bg-black text-white text-center p-4">
  <p>© 2026 Thread Vibe</p>
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({name, price});
  total += price;
  document.getElementById('cart-count').innerText = cart.length;
  renderCart();
}

function renderCart() {
  let list = document.getElementById('cart-items');
  list.innerHTML = '';
  cart.forEach(item => {
    let li = document.createElement('li');
    li.innerText = item.name + ' - PKR ' + item.price;
    list.appendChild(li);
  });
  document.getElementById('total').innerText = total;
}

function toggleCart() {
  let cartBox = document.getElementById('cart');
  cartBox.classList.toggle('hidden');
}
</script>

</body>
</html>
